<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pattern Recorder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
</head>
<body>
    <div class="main-container">
        <div class="nav-header">
            <h2>Memory Pattern Recorder</h2>
            <div class="nav-links">
                <a href="index.html" class="active">Memory Pattern</a>
                <a href="flipimage.html">Same Image Flip</a>
                <a href="difimage.html">Image Different</a>
                <a href="sudokusolver.html">Sudoku Solver</a>
                <a href="treasuremap.html">Treasure Map</a>
            </div>
        </div>

        <div class="preview-wrapper">
            <video id="videoPlayer" controls></video>
            <canvas id="overlayCanvas"></canvas>
        </div>

        <div id="status">Loading OpenCV...</div>

        <div class="control-panel">
            <input type="file" id="videoInput" accept="video/*">
            
            <div class="slider-row">
                <div class="slider-header">
                    <label>Top Margin</label>
                    <span class="val-badge" id="valTop">10%</span>
                </div>
                <input type="range" id="marginTop" min="0" max="100" value="10">
            </div>
            <div class="slider-row">
                <div class="slider-header">
                    <label>Bottom Margin</label>
                    <span class="val-badge" id="valBottom">10%</span>
                </div>
                <input type="range" id="marginBottom" min="0" max="100" value="10">
            </div>
            <div class="slider-row">
                <div class="slider-header">
                    <label>Side Margin</label>
                    <span class="val-badge" id="valSide">10%</span>
                </div>
                <input type="range" id="marginSide" min="0" max="100" value="10">
            </div>

            <button id="processBtn" class="action-btn" disabled>Start Analysis</button>
            <button id="btnKeyMapper" class="action-btn" style="margin-top: 10px;" onclick="downloadKeyMapperJSON()">Download KeyMapper JSON</button>
        </div>

        <div id="grid" class="results-grid"></div>
        
        <canvas id="procCanvas" style="display:none;"></canvas>
    </div>
    <script src="script.js"></script>
    <script>
        // Update badges
        document.getElementById('marginTop').oninput = (e) => document.getElementById('valTop').innerText = e.target.value + '%';
        document.getElementById('marginBottom').oninput = (e) => document.getElementById('valBottom').innerText = e.target.value + '%';
        document.getElementById('marginSide').oninput = (e) => document.getElementById('valSide').innerText = e.target.value + '%';
        
        function onOpenCvReady() {
            if (window.onOpenCvReadyScript) window.onOpenCvReadyScript();
        }
    </script>
</body>
</html>
